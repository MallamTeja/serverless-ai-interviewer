# Vercel Deployment Configuration for AI-Plotform (Monorepo)

# Root project configuration
projectSettings:
  framework: null  # Monorepo - no single framework
  
# Frontend deployment (Next.js/React)
frontend:
  name: ai-plotform-frontend
  rootDirectory: frontend
  buildCommand: npm run build
  outputDirectory: dist
  framework: create-react-app
  nodeVersion: "18.x"
  env:
    # Add frontend environment variables here
    - REACT_APP_API_URL=@REACT_APP_API_URL

# Backend deployment (Node.js/Express)
backend:
  name: ai-plotform-backend
  rootDirectory: backend
  buildCommand: npm run build || npm install
  outputDirectory: dist
  nodeVersion: "18.x"
  env:
    # Add backend environment variables here
    - DATABASE_URL=@DATABASE_URL
    - API_PORT=@API_PORT

# Deployment preview settings
previewDeployments:
  enabled: true
  
# Git settings
git:
  deploymentEnabled:
    production: true
    preview: true
